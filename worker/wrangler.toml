name = "ai-detector-worker"
main = "src/index.ts"
compatibility_date = "2024-03-20"

# Environment variables (set via wrangler secret or .dev.vars)
[vars]
# OPENROUTER_API_KEY = "your-api-key-here"  # Use wrangler secret instead

# Rate limiting
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
# 10 requests per minute per IP
simple = { limit = 10, period = 60 }